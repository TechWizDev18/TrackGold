<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GoldTracker — AI Gold Analysis{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C96A;
            --gold-pale: #F5E6BA;
            --gold-dark: #8B6914;
            --bg-base: #090D12;
            --bg-card: #0F1520;
            --bg-card2: #141E2B;
            --border: rgba(201,168,76,0.15);
            --border-light: rgba(255,255,255,0.07);
            --text-primary: #EEE8D5;
            --text-secondary: #8FA3B4;
            --text-muted: #4A6070;
            --green: #3DBA7A;
            --red: #E05252;
            --blue: #5B9BD5;
            --purple: #8B6ED8;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% -10%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 110%, rgba(91,155,213,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Nav ── */
        .nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(9,13,18,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 800; font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: var(--gold-light);
            text-decoration: none;
        }
        .nav-brand span { color: var(--text-primary); }
        .nav-links { display: flex; gap: 4px; }
        .nav-link {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px; font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav-link.active {
            color: var(--gold-light);
            background: rgba(201,168,76,0.1);
            border-color: var(--border);
        }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-live 2s infinite;
        }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,186,122,0.5); }
            50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(61,186,122,0); }
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .card-gold {
            border-color: var(--border);
            background: linear-gradient(135deg, rgba(201,168,76,0.06) 0%, var(--bg-card) 60%);
        }

        /* ── Labels & Badges ── */
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 600;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        .badge-live { background: rgba(61,186,122,0.15); color: var(--green); border: 1px solid rgba(61,186,122,0.3); }
        .badge-gold { background: rgba(201,168,76,0.15); color: var(--gold-light); border: 1px solid var(--border); }
        .badge-blue { background: rgba(91,155,213,0.15); color: var(--blue); border: 1px solid rgba(91,155,213,0.3); }

        /* ── Numbers ── */
        .mono { font-family: 'DM Mono', monospace; }
        .price-up { color: var(--green); }
        .price-down { color: var(--red); }
        .price-neutral { color: var(--text-secondary); }
        .display-price {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: -0.02em;
        }

        /* ── Section headers ── */
        .section-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .section-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ── Buttons ── */
        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 8px;
            background: var(--gold);
            color: #0A0D10;
            font-weight: 600; font-size: 13px;
            border: none; cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-secondary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
            font-weight: 500; font-size: 13px;
            border: 1px solid var(--border-light); cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        /* ── Gauge bar ── */
        .gauge-bar {
            height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.08);
            overflow: hidden; margin-top: 6px;
        }
        .gauge-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

        /* ── Table ── */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            font-family: 'DM Mono', monospace;
            font-size: 10px; font-weight: 500;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px 12px; text-align: left;
            border-bottom: 1px solid var(--border-light);
        }
        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
            color: var(--text-primary);
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }
        .data-table tr:last-child td { border-bottom: none; }

        /* ── Separator ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-light), transparent);
            margin: 1.5rem 0;
        }

        /* ── Spinner ── */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(201,168,76,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Layout ── */
        .page-wrapper {
            position: relative; z-index: 1;
            max-width: 1280px; margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── Skeleton loader ── */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card2) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes skeleton-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 3px; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="nav">
    <a href="/" class="nav-brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="var(--gold)" stroke="var(--gold-light)" stroke-width="0.5"/>
        </svg>
        Track<span>Gold</span>
    </a>

    <div class="nav-links">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/analysis" class="nav-link {% if request.path == '/analysis' %}active{% endif %}">AI Analysis</a>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
        <div class="live-dot"></div>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted)">LIVE</span>
        <span id="nav-price" style="font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--gold-light)">—</span>
    </div>
</nav>

<!-- Content -->
<div class="page-wrapper">
    {% block content %}{% endblock %}
</div>

<!-- Footer -->
<footer style="text-align:center;padding:2rem;border-top:1px solid var(--border-light);margin-top:3rem;color:var(--text-muted);font-size:12px;font-family:'DM Mono',monospace;">
    TrackGold Institutional Terminal © 2026 &nbsp;·&nbsp; Powered by AI &amp; Live Market Data
</footer>

<script>
// Global price updater for nav bar
async function updateNavPrice() {
    try {
        const r = await fetch('/api/gold-price');
        const d = await r.json();
        if (d.success) {
            const el = document.getElementById('nav-price');
            if (el) {
                el.textContent = '$' + d.price.toFixed(2);
                el.style.color = d.change >= 0 ? 'var(--green)' : 'var(--red)';
            }
        }
    } catch(e) {}
}
updateNavPrice();
setInterval(updateNavPrice, 30000);
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
